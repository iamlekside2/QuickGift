databases:
  - name: quickgift-db
    plan: free
    databaseName: quickgift
    user: quickgift

services:
  # Backend API
  - type: web
    name: quickgift-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quickgift-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # Admin Dashboard
  - type: web
    name: quickgift-admin
    runtime: node
    plan: free
    rootDir: admin
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -s -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 20.11.0

  # Landing Page
  - type: web
    name: quickgift-landing
    runtime: static
    plan: free
    rootDir: landing
    buildCommand: echo "No build needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
